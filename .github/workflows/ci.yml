name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup hooks fixtures
        run: |
          mkdir -p ~/.claude/hooks
          cp test-fixtures/hooks/*.js ~/.claude/hooks/

      - name: Run unit tests (c3, c4 - CI safe)
        run: |
          echo "=== test-c3-instruction-strings.js ==="
          node tests/test-c3-instruction-strings.js
          echo ""
          echo "=== test-c4-quality-fsm.js ==="
          node tests/test-c4-quality-fsm.js
          echo ""
          echo "UNIT TESTS PASSED"

      - name: Run integration tests (c1, c2 - informational)
        continue-on-error: true
        run: |
          echo "NOTE: c1/c2 require local Forge state, failures are expected in CI"
          echo "=== test-c1-hash-consistency.js ==="
          node tests/test-c1-hash-consistency.js || true
          echo ""
          echo "=== test-c2-context-proxy.js ==="
          node tests/test-c2-context-proxy.js || true
